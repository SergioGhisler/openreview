<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Local Review</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link href="https://unpkg.com/lucide@latest/dist/lucide.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-container" id="app-container">
      
      <!-- Sidebar / Project List Drawer (Hidden on mobile by default) -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="brand">
            <i data-lucide="git-merge"></i>
            <h1>Local Review</h1>
          </div>
          <button id="close-sidebar-btn" class="icon-btn mobile-only" aria-label="Close menu">
            <i data-lucide="x"></i>
          </button>
        </div>

        <form id="open-project-form" class="open-project-form">
          <div class="input-group">
            <i data-lucide="folder-open" class="input-icon"></i>
            <input
              id="project-path"
              name="projectPath"
              placeholder="/Users/you/project"
              autocomplete="off"
              required
            />
            <div id="project-suggestions" class="project-suggestions" role="listbox" aria-label="Project suggestions"></div>
          </div>
          <button type="submit" class="primary-btn w-full mt-2">Open Project</button>
        </form>

        <div class="sidebar-section">
          <h3 class="section-title">Recent Projects</h3>
          <div id="project-list" class="project-list"></div>
        </div>
      </aside>

      <!-- Main Layout -->
      <main class="main-content">
        <!-- Top header -->
        <header class="top-header">
          <div class="header-left">
            <button id="menu-btn" class="icon-btn mobile-only" aria-label="Menu">
              <i data-lucide="menu"></i>
            </button>
            <div class="project-info">
              <button id="project-switcher-btn" class="project-switcher-btn" type="button" aria-haspopup="listbox" aria-expanded="false" disabled>
                <h2 id="project-title">No project</h2>
                <i data-lucide="chevrons-up-down"></i>
              </button>
              <div id="worktree-menu" class="worktree-menu" role="listbox" aria-label="Project worktrees"></div>
              <p id="project-meta" class="text-truncate">Open a project to start</p>
            </div>
          </div>
          <div class="header-actions">
            <button id="commit-btn" class="secondary-btn" disabled>Commit</button>
            <button id="push-btn" class="primary-btn" disabled>Push</button>
            <button id="pr-btn" class="secondary-btn" disabled>Create PR</button>
            <button id="refresh-btn" class="icon-btn" aria-label="Refresh" disabled>
              <i data-lucide="refresh-cw"></i>
            </button>
          </div>
        </header>

        <!-- Two column workspace (Files & Diff) -->
        <div class="workspace">
          
          <!-- Files List Panel -->
          <div class="files-panel" id="files-panel">
            <div class="panel-header">
              <h3>Changed Files</h3>
              <button id="add-all-btn" class="secondary-btn compact">Add All</button>
              <span id="files-count" class="badge">0</span>
            </div>
            <div class="panel-content">
              <div id="files-list" class="files-list empty">No data yet.</div>
            </div>
            <div id="pr-section" class="pr-section collapsed">
              <div class="panel-header pr-panel-header">
                <button id="pr-toggle-btn" class="pr-toggle-btn" type="button" aria-expanded="false" aria-controls="pr-panel-content">
                  <h3>Open PRs</h3>
                  <span id="pr-count" class="badge">0</span>
                  <i class="pr-toggle-icon" data-lucide="chevron-down"></i>
                </button>
                <button id="refresh-prs-btn" class="icon-btn compact-icon-btn" aria-label="Refresh pull requests">
                  <i data-lucide="rotate-cw"></i>
                </button>
              </div>
              <div id="pr-panel-content" class="panel-content pr-panel-content">
                <div id="pr-list" class="pr-list empty">Select a git project to load pull requests.</div>
              </div>
            </div>
          </div>

          <!-- Diff Panel -->
          <div class="diff-panel" id="diff-panel">
            <div class="panel-header diff-header">
              <button id="back-to-files-btn" class="icon-btn mobile-only mr-2" aria-label="Back to files">
                <i data-lucide="arrow-left"></i>
              </button>
              <h3 id="diff-file-name" class="text-truncate">Select a file</h3>
            </div>
            <div class="diff-content">
              <pre id="diff-viewer" class="diff-viewer"><span class="diff-line diff-context"></span>Pick a file to inspect its diff.</span></pre>
            </div>
          </div>

        </div>
      </main>

      <!-- Overlay for mobile sidebar -->
      <div id="sidebar-overlay" class="sidebar-overlay"></div>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
    <script src="/app.js"></script>
  </body>
</html>
